<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小红书图文生成器</title>
    <link rel="stylesheet" href="./styles.css?v=20260716-2" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Text To Pic</p>
        <h1>小红书图文生成器</h1>
      </div>
      <div class="topbar-status" id="statusText" role="status" aria-live="polite">就绪</div>
    </header>

    <main class="workspace">
      <section class="editor-pane" aria-label="编辑区">
        <div class="section-head">
          <div>
            <p class="eyebrow">正文</p>
            <h2>输入内容</h2>
          </div>
          <div class="quick-actions">
            <button class="ghost-button" id="sampleButton" type="button">示例</button>
            <button class="ghost-button" id="clearButton" type="button">清空</button>
          </div>
        </div>

        <label class="title-field" for="titleInput">
          <span>标题</span>
          <input
            id="titleInput"
            type="text"
            maxlength="80"
            placeholder="用于图片标题和文件名"
          />
        </label>

        <div class="rich-editor-shell">
          <div class="format-toolbar" role="toolbar" aria-label="正文格式">
            <button
              class="format-tool"
              id="boldButton"
              type="button"
              title="加粗"
              aria-label="加粗"
              aria-keyshortcuts="Control+B Meta+B"
              aria-pressed="false"
            >
              <strong aria-hidden="true">B</strong>
            </button>
            <span class="format-divider" aria-hidden="true"></span>
            <div class="format-color-group">
              <button
                class="format-tool"
                id="textColorButton"
                type="button"
                title="应用文字颜色"
                aria-label="应用文字颜色"
              >
                <span class="text-color-glyph" aria-hidden="true">A</span>
              </button>
              <input
                class="color-picker"
                id="textColorPicker"
                type="color"
                value="#c94f3d"
                title="选择文字颜色"
                aria-label="选择文字颜色"
              />
            </div>
            <div class="format-color-group">
              <button
                class="format-tool"
                id="highlightButton"
                type="button"
                title="应用或取消荧光高亮"
                aria-label="应用或取消荧光高亮"
                aria-pressed="false"
              >
                <span class="highlight-glyph" aria-hidden="true">A</span>
              </button>
              <input
                class="color-picker"
                id="highlightColorPicker"
                type="color"
                value="#ffe568"
                title="选择高亮颜色"
                aria-label="选择高亮颜色"
              />
            </div>
            <span class="format-divider" aria-hidden="true"></span>
            <button
              class="format-tool clear-format-tool"
              id="clearFormatButton"
              type="button"
              title="清除所选文字格式"
            >
              清除格式
            </button>
          </div>
          <div
            id="textInput"
            class="rich-editor"
            contenteditable="true"
            role="textbox"
            aria-label="正文内容"
            aria-multiline="true"
            spellcheck="false"
            data-placeholder="粘贴正文"
          ></div>
        </div>

        <div class="controls" aria-label="输出设置">
          <div class="save-line" id="saveLine">
            <div>
              <span class="control-title">保存目录</span>
              <p id="directoryStatus" aria-live="polite">未设置保存目录</p>
            </div>
            <div class="directory-actions">
              <button class="ghost-button" id="chooseDirectoryButton" type="button">选择目录</button>
              <button class="ghost-button" id="clearDirectoryButton" type="button">清除</button>
            </div>
          </div>

          <div class="mobile-save-hint" id="mobileSaveHint" hidden>
            移动端不支持固定保存目录，点击下载会调用浏览器原生下载。请在浏览器下载列表或手机文件管理的下载目录查看图片。
          </div>

          <div class="control-line">
            <span class="control-title">输出</span>
            <div class="segmented" role="radiogroup" aria-label="输出模式">
              <label>
                <input type="radio" name="exportMode" value="long" checked />
                <span>长图</span>
              </label>
              <label>
                <input type="radio" name="exportMode" value="pages" />
                <span>固定分段</span>
              </label>
            </div>
          </div>

          <div class="control-grid">
            <label class="field" for="themeSelect">
              <span>模板</span>
              <select id="themeSelect">
                <option value="clean">清白</option>
                <option value="ink">墨绿</option>
                <option value="rose">绯红</option>
                <option value="night">夜读</option>
              </select>
            </label>

            <label class="field" for="fontSelect">
              <span>字体</span>
              <select id="fontSelect">
                <option value="system">现代黑体</option>
                <option value="serif">书页宋体</option>
                <option value="kai">手写楷体</option>
              </select>
            </label>

            <label class="field" for="widthSelect">
              <span>宽度</span>
              <select id="widthSelect">
                <option value="1080">1080 px</option>
                <option value="1242">1242 px</option>
              </select>
            </label>

            <label class="field" for="sliceHeight">
              <span>分段高度</span>
              <select id="sliceHeight">
                <option value="1440">1440 px</option>
                <option value="1620">1620 px</option>
                <option value="1920">1920 px</option>
              </select>
            </label>
          </div>

          <div class="range-grid">
            <label class="range-field" for="fontSize">
              <span>字号 <strong id="fontSizeValue">46</strong></span>
              <input id="fontSize" type="range" min="34" max="66" value="46" />
            </label>

            <label class="range-field" for="lineHeight">
              <span>行距 <strong id="lineHeightValue">1.75</strong></span>
              <input id="lineHeight" type="range" min="1.45" max="2.15" step="0.05" value="1.75" />
            </label>

            <label class="range-field" for="pagePadding">
              <span>边距 <strong id="pagePaddingValue">118</strong></span>
              <input id="pagePadding" type="range" min="72" max="180" value="118" />
            </label>
          </div>
        </div>

        <div class="actions">
          <button class="primary-button" id="downloadPrimary" type="button">下载长图</button>
          <button class="secondary-button" id="downloadAll" type="button">下载全部</button>
        </div>
      </section>

      <aside class="preview-pane" aria-label="预览区">
        <div class="section-head">
          <div>
            <p class="eyebrow">预览</p>
            <h2>输出图片</h2>
          </div>
          <div class="preview-meta" id="previewMeta">0 张</div>
        </div>
        <div class="preview-scroller">
          <div class="preview-list" id="previewList"></div>
        </div>
      </aside>
    </main>

    <footer class="site-footer">
      <span>© 2026 Ewan</span>
      <span>作者：Ewan Yu</span>
      <a href="https://github.com/Ewan-yu/textToPic" target="_blank" rel="noreferrer">GitHub 开源仓库</a>
    </footer>

    <div class="modal-backdrop" id="exportDialog" hidden>
      <div
        class="export-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="exportDialogTitle"
      >
        <p class="eyebrow">导出完成</p>
        <h2 id="exportDialogTitle">图片已保存</h2>
        <p id="exportDialogMessage">已完成导出。</p>
        <button class="primary-button" id="exportDialogClose" type="button">知道了</button>
      </div>
    </div>

    <script src="./app.js?v=20260716-2"></script>
  </body>
</html>
